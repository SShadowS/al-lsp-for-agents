name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            artifact: windows-x64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            artifact: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Go wrapper
        working-directory: al-language-server-go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o ../al-lsp-wrapper${{ matrix.ext }} .

      # Downloads the exact asset name from al-call-hierarchy releases
      # Note: al-call-hierarchy must be a public repo for github.token to work
      - name: Download al-call-hierarchy
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            gh release download --repo SShadowS/al-call-hierarchy --pattern "al-call-hierarchy-windows-x64.exe" -D .
          else
            gh release download --repo SShadowS/al-call-hierarchy --pattern "al-call-hierarchy-linux-x64" -D .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact }}
          path: |
            al-lsp-wrapper${{ matrix.ext }}
            al-call-hierarchy-${{ matrix.artifact }}*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package standalone binaries
        run: |
          # Windows
          mkdir -p release/windows
          cp artifacts/binaries-windows-x64/al-lsp-wrapper.exe release/windows/
          cp artifacts/binaries-windows-x64/al-call-hierarchy-windows-x64.exe release/windows/al-call-hierarchy.exe
          cd release/windows && zip ../../al-lsp-wrapper-windows-x64.zip * && cd ../..

          # Linux
          mkdir -p release/linux
          cp artifacts/binaries-linux-x64/al-lsp-wrapper release/linux/
          cp artifacts/binaries-linux-x64/al-call-hierarchy-linux-x64 release/linux/al-call-hierarchy
          chmod +x release/linux/*
          cd release/linux && tar czf ../../al-lsp-wrapper-linux-x64.tar.gz * && cd ../..

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build VS Code extension
        working-directory: vscode-extension
        run: |
          npm ci

          # Windows vsix
          mkdir -p bin
          cp ../artifacts/binaries-windows-x64/al-lsp-wrapper.exe bin/
          cp ../artifacts/binaries-windows-x64/al-call-hierarchy-windows-x64.exe bin/al-call-hierarchy.exe
          npx @vscode/vsce package --target win32-x64 -o ../al-lsp-for-agents-win32-x64.vsix
          rm -rf bin

          # Linux vsix
          mkdir -p bin
          cp ../artifacts/binaries-linux-x64/al-lsp-wrapper bin/
          cp ../artifacts/binaries-linux-x64/al-call-hierarchy-linux-x64 bin/al-call-hierarchy
          chmod +x bin/*
          npx @vscode/vsce package --target linux-x64 -o ../al-lsp-for-agents-linux-x64.vsix
          rm -rf bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            al-lsp-wrapper-windows-x64.zip
            al-lsp-wrapper-linux-x64.tar.gz
            al-lsp-for-agents-win32-x64.vsix
            al-lsp-for-agents-linux-x64.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          # Publish the pre-built .vsix files (identical to GitHub release assets)
          npx @vscode/vsce publish --packagePath al-lsp-for-agents-win32-x64.vsix
          npx @vscode/vsce publish --packagePath al-lsp-for-agents-linux-x64.vsix
