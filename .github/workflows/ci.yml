name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Vet
        working-directory: al-language-server-go
        run: go vet ./...

      - name: Test
        working-directory: al-language-server-go
        run: go test ./...

      - name: Build Windows
        working-directory: al-language-server-go
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o /tmp/al-lsp-wrapper.exe .

      - name: Build Linux
        working-directory: al-language-server-go
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o /tmp/al-lsp-wrapper .

  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile
        working-directory: vscode-extension
        run: npm run compile
